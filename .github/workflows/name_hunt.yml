name: Name Hunter (qadrisaifnaimuddin Edition)

on:
  schedule:
    - cron: '*/35 * * * *' # Every 35 mins (to slightly offset from the general hunt)
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Hunter
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python hunter.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "NameHunterBot"
          git config --global user.email "bot@namehunter.com"
          git add state.json
          git commit -m "Update Name Hunt state [skip ci]" || echo "No changes to commit"
          git push
